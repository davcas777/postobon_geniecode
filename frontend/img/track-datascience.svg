<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" fill="none">
  <!-- Background glow -->
  <ellipse cx="140" cy="195" rx="100" ry="12" fill="#7C3AED" opacity=".06"/>

  <!-- Brain outline - left hemisphere -->
  <path d="M115 60 C85 60, 65 85, 65 115 C65 145, 85 170, 115 170 L115 115" stroke="#7C3AED" stroke-width="2.5" fill="#7C3AED" fill-opacity=".04" stroke-linecap="round"/>
  <!-- Brain outline - right hemisphere -->
  <path d="M145 60 C175 60, 195 85, 195 115 C195 145, 175 170, 145 170 L145 115" stroke="#7C3AED" stroke-width="2.5" fill="#7C3AED" fill-opacity=".06" stroke-linecap="round"/>
  <!-- Brain center -->
  <line x1="115" y1="60" x2="145" y2="60" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="115" y1="170" x2="145" y2="170" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Brain folds left -->
  <path d="M115 85 C100 85, 85 95, 80 110" stroke="#7C3AED" stroke-width="1.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <path d="M115 115 C95 115, 80 125, 78 140" stroke="#7C3AED" stroke-width="1.5" fill="none" opacity=".3" stroke-linecap="round"/>

  <!-- Brain folds right -->
  <path d="M145 85 C160 85, 175 95, 180 110" stroke="#7C3AED" stroke-width="1.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <path d="M145 115 C165 115, 180 125, 182 140" stroke="#7C3AED" stroke-width="1.5" fill="none" opacity=".3" stroke-linecap="round"/>

  <!-- Neural nodes -->
  <circle cx="90" cy="90" r="5" fill="#7C3AED" opacity=".7"/>
  <circle cx="75" cy="120" r="4" fill="#7C3AED" opacity=".5"/>
  <circle cx="88" cy="145" r="5" fill="#7C3AED" opacity=".6"/>
  <circle cx="170" cy="90" r="5" fill="#7C3AED" opacity=".7"/>
  <circle cx="185" cy="120" r="4" fill="#7C3AED" opacity=".5"/>
  <circle cx="172" cy="145" r="5" fill="#7C3AED" opacity=".6"/>
  <circle cx="130" cy="75" r="4" fill="#7C3AED" opacity=".8"/>
  <circle cx="130" cy="155" r="4" fill="#7C3AED" opacity=".8"/>

  <!-- Neural connections -->
  <line x1="90" y1="90" x2="130" y2="75" stroke="#7C3AED" stroke-width="1" opacity=".25"/>
  <line x1="170" y1="90" x2="130" y2="75" stroke="#7C3AED" stroke-width="1" opacity=".25"/>
  <line x1="90" y1="90" x2="75" y2="120" stroke="#7C3AED" stroke-width="1" opacity=".2"/>
  <line x1="75" y1="120" x2="88" y2="145" stroke="#7C3AED" stroke-width="1" opacity=".2"/>
  <line x1="170" y1="90" x2="185" y2="120" stroke="#7C3AED" stroke-width="1" opacity=".2"/>
  <line x1="185" y1="120" x2="172" y2="145" stroke="#7C3AED" stroke-width="1" opacity=".2"/>
  <line x1="88" y1="145" x2="130" y2="155" stroke="#7C3AED" stroke-width="1" opacity=".25"/>
  <line x1="172" y1="145" x2="130" y2="155" stroke="#7C3AED" stroke-width="1" opacity=".25"/>
  <line x1="90" y1="90" x2="170" y2="90" stroke="#7C3AED" stroke-width="1" opacity=".15" stroke-dasharray="4 3"/>

  <!-- Floating data points -->
  <circle cx="50" cy="75" r="3" fill="#7C3AED" opacity=".3"/>
  <circle cx="42" cy="100" r="2" fill="#7C3AED" opacity=".2"/>
  <circle cx="210" cy="75" r="3" fill="#7C3AED" opacity=".3"/>
  <circle cx="218" cy="100" r="2" fill="#7C3AED" opacity=".2"/>

  <!-- Sparkles -->
  <path d="M215 155 L218 163 L215 171 L212 163Z" fill="#7C3AED" opacity=".35"/>
  <path d="M209 163 L215 160 L221 163 L215 166Z" fill="#7C3AED" opacity=".35"/>
  <path d="M55 155 L57 160 L55 165 L53 160Z" fill="#7C3AED" opacity=".25"/>
  <path d="M51 160 L55 158 L59 160 L55 162Z" fill="#7C3AED" opacity=".25"/>

  <!-- MLflow badge -->
  <rect x="195" y="158" width="52" height="20" rx="10" fill="#7C3AED" fill-opacity=".1" stroke="#7C3AED" stroke-opacity=".3" stroke-width="1"/>
  <text x="221" y="172" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="700" fill="#7C3AED" opacity=".6">MLflow</text>
</svg>

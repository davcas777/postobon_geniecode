  <path d="M136 55 L136 50 C136 46, 139 43, 140 43 C141 43, 144 46, 144 50 L144 55" stroke="#0891B2" stroke-width="1.5" fill="none" opacity=".4"/>

  <!-- Sparkles -->
  <path d="M60 150 L63 158 L60 166 L57 158Z" fill="#0891B2" opacity=".3"/>
  <path d="M54 158 L60 155 L66 158 L60 161Z" fill="#0891B2" opacity=".3"/>
  <path d="M220 150 L222 155 L220 160 L218 155Z" fill="#0891B2" opacity=".25"/>
  <path d="M216 155 L220 153 L224 155 L220 157Z" fill="#0891B2" opacity=".25"/>

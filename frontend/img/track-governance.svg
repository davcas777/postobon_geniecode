  <!-- Checkmark -->
  <path d="M118 115 L133 132 L165 96" stroke="#0891B2" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".85"/>

  <!-- Quality bars (left side) -->
  <rect x="38" y="78" width="30" height="5" rx="2.5" fill="#0891B2" opacity=".2"/>
  <rect x="38" y="90" width="24" height="5" rx="2.5" fill="#0891B2" opacity=".15"/>
  <rect x="38" y="102" width="28" height="5" rx="2.5" fill="#0891B2" opacity=".25"/>
  <rect x="38" y="114" width="18" height="5" rx="2.5" fill="#0891B2" opacity=".12"/>

  <!-- Quality bars (right side) -->
  <rect x="212" y="78" width="30" height="5" rx="2.5" fill="#0891B2" opacity=".2"/>
  <rect x="216" y="90" width="24" height="5" rx="2.5" fill="#0891B2" opacity=".15"/>
  <rect x="214" y="102" width="28" height="5" rx="2.5" fill="#0891B2" opacity=".25"/>
  <rect x="220" y="114" width="18" height="5" rx="2.5" fill="#0891B2" opacity=".12"/>

  <!-- Small check icons next to bars -->
  <circle cx="33" cy="80" r="3" fill="#0891B2" opacity=".3"/>
  <circle cx="33" cy="92" r="3" fill="#0891B2" opacity=".2"/>
  <circle cx="33" cy="104" r="3" fill="#0891B2" opacity=".35"/>
  <circle cx="247" cy="80" r="3" fill="#0891B2" opacity=".3"/>
  <circle cx="247" cy="92" r="3" fill="#0891B2" opacity=".2"/>
  <circle cx="247" cy="104" r="3" fill="#0891B2" opacity=".35"/>

  <!-- Lock icon at top -->
